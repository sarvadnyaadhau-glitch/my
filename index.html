<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghatiya Game Testing</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #222; color: #fff; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ffcc; border: none; border-radius: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #timer { font-size: 24px; color: #ffcc00; margin: 20px; }
        #log { color: #888; margin-top: 20px; font-style: italic; }
    </style>

    <!-- Monetag Verification -->
    <meta name="monetag" content="b00ccafba279ae010eb77eb9097bd80f">

    <!-- MONETAG VIGNETTE CODE -->
    <script>(function(s){s.dataset.zone='11271687',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</head>
<body>

    <h1>Level: <span id="level-id">1</span></h1>
    <div id="timer">Ready to test?</div>
    <button id="action-btn" onclick="startLevel()">Start 10s Level</button>
    <div id="log"></div>

    <script>
        let currentLevel = 1;
        let timeLeft = 10;
        let timerInterval;

        function startLevel() {
            document.getElementById('action-btn').disabled = true;
            timeLeft = 10;
            document.getElementById('timer').innerText = `Level Ends in: ${timeLeft}s`;
            document.getElementById('log').innerText = "Game running...";

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Level Ends in: ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    levelComplete();
                }
            }, 1000);
        }

        function levelComplete() {
            document.getElementById('timer').innerText = "Level Complete!";
            document.getElementById('log').innerText = "Forcing Monetag Vignette Ad...";
            
            // 🔥 YAHAN SE AD AUTOMATIC HAR 10 SEC BAAD CALL HOGI
            if (typeof show_11271687 === 'function') {
                show_11271687();
            } else {
                console.log("Ad script load ho rahi hai, next transition par dikhegi.");
            }

            // Agle level par bhejo bina game roke
            nextLevel();
        }

        function nextLevel() {
            currentLevel++;
            document.getElementById('level-id').innerText = currentLevel;
            document.getElementById('timer').innerText = "Level Loaded!";
            document.getElementById('action-btn').disabled = false;
            document.getElementById('action-btn').innerText = `Start Level ${currentLevel}`;
        }
    </script>
</body>
</html>
