<body>

    <h1>Level: <span id="level-id">1</span></h1>
    <div id="timer">Ready to test?</div>
    <button id="action-btn" onclick="handleButtonClick()">Start 10s Level</button>
    <div id="log"></div>

    <script>
        let currentLevel = 1;
        let timeLeft = 10;
        let timerInterval;
        let isLevelOver = false;

        function handleButtonClick() {
            if (isLevelOver) {
                // 🔥 Agar level khatam ho chuka hai, toh naye tab me direct ad kholo
                window.open('https://omg10.com/4/11271728', '_blank');
                
                // Ad kholne ke baad game ka next level setup karo
                nextLevel();
            } else {
                // Agar game chalana hai
                startLevel();
            }
        }

        function startLevel() {
            document.getElementById('action-btn').disabled = true;
            isLevelOver = false;
            timeLeft = 10;
            document.getElementById('timer').innerText = `Level Ends in: ${timeLeft}s`;
            document.getElementById('log').innerText = "Game running...";

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Level Ends in: ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    levelComplete();
                }
            }, 1000);
        }

        function levelComplete() {
            isLevelOver = true;
            document.getElementById('timer').innerText = "Level Complete!";
            document.getElementById('log').innerText = "Click the button below to claim reward & start next level!";
            
            // Button ko firse chalu karo taaki user click kare
            let btn = document.getElementById('action-btn');
            btn.disabled = false;
            btn.innerText = `Claim Reward & Start Level ${currentLevel + 1}`;
            
            // Vignette Auto-Trigger Attempt
            if (typeof show_11271687 === 'function') {
                show_11271687();
            }
        }

        function nextLevel() {
            currentLevel++;
            isLevelOver = false;
            document.getElementById('level-id').innerText = currentLevel;
            document.getElementById('timer').innerText = "Level Loaded!";
            
            let btn = document.getElementById('action-btn');
            btn.innerText = `Start 10s Level`;
        }
    </script>
</body>
</html>
